<!DOCTYPE html>

<html>

<head><meta charset="utf-8"></head>

<body>

<img title="img/test.png" src="img/test.png">

<!--
ls img/*.jbig2 | sed 's|.*|<img title="\0" src="\0">|'
-->
<img title="img/test.jbig2" src="img/test.jbig2">



<!-- NOTE this breaks on file URLs
  but decodeTiffToBMP does not work on file URLs anyway
  https://stackoverflow.com/questions/61052684/how-to-load-a-wasm-module-locally
-->
<script src="build-wasm/jbig2-polyfill.js"></script>

<script type="module">

// FIXME lazy-load the module in replaceJBIG2Images
// only when TIFF images were found
const jbig2_polyfill = await create_jbig2_polyfill_module();

// const jbig2_to_bmp = jbig2_polyfill.cwrap(
//   "jbig2_to_bmp",
//   "number",
//   ["number", "number", "number", "number"]
// );
const jbig2_to_bmp = jbig2_polyfill._jbig2_to_bmp;

// const free_buffer = jbig2_polyfill.cwrap("free_buffer", null, ["number"]);
const free_buffer = jbig2_polyfill._free_buffer;

async function decodeTiffToBMP(url) {
  // WONTFIX this will never work over the file protocol
  // Access to fetch at 'file:...' from origin 'null' has been blocked by CORS policy
  const res = await fetch(url);
  const buf = await res.arrayBuffer();

  const inputPtr = jbig2_polyfill._malloc(buf.byteLength);
  jbig2_polyfill.HEAPU8.set(new Uint8Array(buf), inputPtr);

  const outSizePtr = jbig2_polyfill._malloc(4);

  const outPtr = jbig2_to_bmp(
    inputPtr,
    buf.byteLength,
    outSizePtr,
    // 1 // 1-bit BMP
  );

  if (!outPtr) {
    // throw new Error("TIFF decode failed");
    return;
  }

  const outSize = jbig2_polyfill.HEAPU32[outSizePtr >> 2];

  const bmp = jbig2_polyfill.HEAPU8.slice(outPtr, outPtr + outSize);

  free_buffer(outPtr);
  jbig2_polyfill._free(inputPtr);
  jbig2_polyfill._free(outSizePtr);

  return bmp;
}

async function replaceJBIG2Images() {
  const images = document.querySelectorAll("img");

  for (const img of images) {
    if (!img.src.endsWith(".jbig2") && !img.src.endsWith(".jb2")) continue;

    try {
      const bmpData = await decodeTiffToBMP(img.src);

      const blob = new Blob([bmpData], { type: "image/bmp" });
      const url = URL.createObjectURL(blob);

      img.src = url;
    } catch (e) {
      // TIFF decode failed: Only 1-bit supported
      console.error(`TIFF decode failed: ${e.message} @ ${img.src}`);
    }
  }
}

replaceJBIG2Images();

</script>

</body>
</html>
